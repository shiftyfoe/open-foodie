name: Test Instagram Proxy Rotation

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-proxy-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test proxy fetching
        run: |
          python3 -c "
          from scrapers.proxy import fetch_proxies, test_proxy, test_instagram_proxy, ProxyPool

          print('=== Fetching proxies ===')
          proxies = fetch_proxies()
          print(f'Got {len(proxies)} raw proxies')
          if proxies:
              print(f'Sample: {proxies[:3]}')

          print()
          print('=== Testing proxies against httpbin ===')
          working = 0
          for p in proxies[:10]:
              ok = test_proxy(p)
              status = '✓' if ok else '✗'
              print(f'  {status} {p}')
              if ok:
                  working += 1
          print(f'{working}/10 passed httpbin test')

          print()
          print('=== Testing proxies against Instagram ===')
          ig_working = 0
          for p in proxies[:10]:
              ok = test_instagram_proxy(p)
              status = '✓' if ok else '✗'
              print(f'  {status} {p}')
              if ok:
                  ig_working += 1
          print(f'{ig_working}/10 passed Instagram test')
          "

      - name: Test gallery-dl with proxy
        run: |
          echo "=== Test: gallery-dl with proxy rotation ==="
          python3 -c "
          from scrapers.proxy import ProxyPool
          from scrapers.instagram import _fetch_post_metadata
          import json

          pool = ProxyPool.build(min_working=2, test_ig=True)
          print(f'Pool size: {len(pool)}')

          url = 'https://www.instagram.com/danielfooddiary/reel/DZ9wTjEhbFk/'

          # Try with proxy
          if pool:
              proxy = pool.get()
              print(f'Trying with proxy: {proxy}')
              data = _fetch_post_metadata(url, proxy=proxy)
              if data:
                  print(f'✓ Got data: {json.dumps(data)[:200]}')
              else:
                  print('✗ Failed with proxy')

          # Try without proxy
          print('Trying without proxy...')
          data = _fetch_post_metadata(url)
          if data:
              print(f'✓ Got data: {json.dumps(data)[:200]}')
          else:
              print('✗ Failed without proxy')
          "
