name: Test Playwright Instagram Embed

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Instagram embed with Playwright
        run: |
          python3 -c "
          import json
          from playwright.sync_api import sync_playwright

          print('=== Playwright Instagram Embed Test ===')

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()

              # Navigate to embed page
              print('Loading embed page...')
              page.goto('https://www.instagram.com/p/DZ9wTjEhbFk/embed/', wait_until='networkidle', timeout=30000)

              # Wait for content to load
              page.wait_for_timeout(3000)

              # Get the page content after JS execution
              content = page.content()
              print(f'Page length: {len(content)}')

              # Try to extract post data
              # Look for caption text
              try:
                  # The embed renders the caption in a specific element
                  caption_el = page.query_selector('.Caption, [class*=Caption], .CaptionContent, span[class*=caption]')
                  if caption_el:
                      print(f'Caption element: {caption_el.inner_text()[:200]}')
              except Exception as e:
                  print(f'Caption selector failed: {e}')

              # Try to get all visible text
              try:
                  body_text = page.inner_text('body')
                  print(f'\\nBody text ({len(body_text)} chars):')
                  # Print meaningful lines
                  for line in body_text.split('\\n'):
                      line = line.strip()
                      if len(line) > 10 and not line.startswith('{'):
                          print(f'  {line[:200]}')
              except Exception as e:
                  print(f'Body text failed: {e}')

              # Try to extract from the rendered DOM
              try:
                  # Get all text content
                  all_text = page.evaluate('''() => {
                      const walker = document.createTreeWalker(
                          document.body,
                          NodeFilter.SHOW_TEXT,
                          null,
                          false
                      );
                      const texts = [];
                      let node;
                      while (node = walker.nextNode()) {
                          const text = node.textContent.trim();
                          if (text.length > 5) {
                              texts.push(text);
                          }
                      }
                      return texts;
                  }''')
                  print(f'\\nAll text nodes ({len(all_text)}):')
                  for t in all_text[:30]:
                      print(f'  {t[:200]}')
              except Exception as e:
                  print(f'Text extraction failed: {e}')

              # Screenshot for debugging
              page.screenshot(path='/tmp/ig_embed.png')
              print('\\nScreenshot saved to /tmp/ig_embed.png')

              browser.close()
          "
