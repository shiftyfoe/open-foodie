name: Test Instagram Googlebot Scraper

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test Instagram scraper
        run: |
          python3 -c "
          from scrapers.instagram import _get_recent_posts, _get_post_details
          import json

          # Test 1: Get recent posts
          print('=== Test 1: Get recent posts from @danielfooddiary ===')
          posts = _get_recent_posts('danielfooddiary')
          print(f'Found {len(posts)} posts')
          for p in posts[:3]:
              print(f'  {p[\"shortcode\"]} | {p[\"date\"]} | {p[\"caption\"][:80]}...')

          if posts:
              # Test 2: Get post details
              sc = posts[0]['shortcode']
              print(f'\\n=== Test 2: Get details for {sc} ===')
              details = _get_post_details(sc)
              if details:
                  print(f'  Caption: {details.get(\"caption\", \"\")[:200]}')
                  print(f'  Date: {details.get(\"date\")}')
                  print(f'  Likes: {details.get(\"likes\")}')
                  print(f'  Comments: {details.get(\"comments\")}')
                  print(f'  Image: {details.get(\"image_url\", \"\")[:100]}...')
              else:
                  print('  ✗ Failed to get details')

          # Test 3: Full scrape
          print('\\n=== Test 3: Full scrape ===')
          from scrapers.instagram import scrape
          db = {'posts': [], 'last_scraped': {}}
          new_posts = scrape(db)
          print(f'\\nTotal new posts: {len(new_posts)}')
          for p in new_posts[:5]:
              print(f'  {p[\"id\"]} | {p[\"date\"]} | {p[\"text\"][:80]}...')
          "
