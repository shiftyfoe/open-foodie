name: Test Instagram Embed Scraping

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-embed:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install curl_cffi requests

      - name: Test embed endpoint data extraction
        run: |
          python3 -c "
          import json, re
          from curl_cffi import requests as cffi_requests

          print('=== Testing Instagram Embed Endpoint ===')
          print()

          # Test multiple post embeds
          shortcodes = ['DZ9wTjEhbFk']  # danielfooddiary reel

          for shortcode in shortcodes:
              url = f'https://www.instagram.com/p/{shortcode}/embed/'
              print(f'--- {shortcode} ---')
              try:
                  resp = cffi_requests.get(
                      url,
                      impersonate='chrome',
                      timeout=15,
                      allow_redirects=True,
                  )
                  print(f'  Status: {resp.status_code}')
                  print(f'  Redirected to login: {\"/accounts/login\" in resp.url}')
                  print(f'  Body length: {len(resp.text)}')

                  if resp.status_code == 200 and '/accounts/login' not in resp.url:
                      text = resp.text

                      # Extract caption from embed HTML
                      # The embed has a specific structure with data in script tags and meta tags

                      # Method 1: Look for caption in the HTML
                      caption_match = re.search(r'<div class=\"Caption\">.*?<span>(.*?)</span>', text, re.DOTALL)
                      if caption_match:
                          caption = re.sub(r'<[^>]+>', '', caption_match.group(1)).strip()
                          print(f'  Caption: {caption[:200]}')

                      # Method 2: Look for JSON-LD or structured data
                      ld_match = re.search(r'<script type=\"application/ld\+json\">(.*?)</script>', text, re.DOTALL)
                      if ld_match:
                          try:
                              ld_data = json.loads(ld_match.group(1))
                              print(f'  JSON-LD: {json.dumps(ld_data, indent=2)[:500]}')
                          except:
                              pass

                      # Method 3: Look for embedded JSON data
                      # Instagram embeds post data in window._sharedData or similar
                      shared_match = re.search(r'\"caption\":\s*\{\"text\":\s*\"(.*?)\"', text)
                      if shared_match:
                          print(f'  Caption from JSON: {shared_match.group(1)[:200]}')

                      # Method 4: Look for any text that looks like a caption
                      # The embed page has meta tags
                      meta_desc = re.search(r'<meta property=\"og:description\" content=\"(.*?)\"', text)
                      if meta_desc:
                          print(f'  OG Description: {meta_desc.group(1)[:200]}')

                      # Method 5: Look for date/time info
                      date_match = re.search(r'\"taken_at\":\s*(\d+)', text)
                      if date_match:
                          from datetime import datetime, timezone
                          dt = datetime.fromtimestamp(int(date_match.group(1)), tz=timezone.utc)
                          print(f'  Date: {dt.isoformat()}')

                      # Method 6: Look for owner/username
                      owner_match = re.search(r'\"username\":\s*\"([^\"]+)\"', text)
                      if owner_match:
                          print(f'  Username: {owner_match.group(1)}')

                      # Show all script content that might have data
                      scripts = re.findall(r'<script[^>]*>(.*?)</script>', text, re.DOTALL)
                      for i, script in enumerate(scripts):
                          if len(script) > 100 and ('caption' in script or 'username' in script or 'shortcode' in script):
                              print(f'  Script {i} ({len(script)} chars): {script[:300]}...')
                              break

              except Exception as e:
                  print(f'  Error: {e}')
              print()
          "
