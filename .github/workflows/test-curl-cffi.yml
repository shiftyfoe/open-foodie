name: Test curl_cffi + Proxy Profile Scraping

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests curl_cffi

      - name: Test profile page scraping with proxy
        run: |
          python3 -c "
          import requests, json, re, random
          from curl_cffi import requests as cffi_requests

          # Find working proxy
          print('=== Finding working IG proxy ===')
          resp = requests.get(
              'https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&proxy_format=protocolipport&format=text&protocol=http&timeout=5000',
              timeout=15
          )
          raw = [l.strip() for l in resp.text.strip().splitlines() if l.strip()]
          random.shuffle(raw)

          proxy = None
          for p in raw[:200]:
              try:
                  r = requests.get(
                      'https://www.instagram.com/instagram/',
                      proxies={'http': p, 'https': p},
                      timeout=10,
                      headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'},
                      allow_redirects=True,
                  )
                  if r.status_code == 200 and '/accounts/login' not in r.url:
                      proxy = p
                      print(f'✓ Found working proxy: {p}')
                      break
              except:
                  pass

          if not proxy:
              print('✗ No working proxy found')
              exit(1)

          # Test 1: Fetch profile page with curl_cffi + proxy
          print()
          print('=== Test 1: Profile page with curl_cffi + proxy ===')
          try:
              resp = cffi_requests.get(
                  'https://www.instagram.com/danielfooddiary/',
                  impersonate='chrome',
                  timeout=15,
                  proxies={'https': proxy, 'http': proxy},
                  allow_redirects=True,
              )
              print(f'  Status: {resp.status_code}')
              print(f'  Final URL: {resp.url}')
              has_login = '/accounts/login' in resp.url
              print(f'  Redirected to login: {has_login}')
              print(f'  Body length: {len(resp.text)}')

              if not has_login:
                  # Try to extract profile data from HTML
                  # Instagram embeds data in <script type=\"application/ld+json\"> or similar
                  text = resp.text

                  # Look for edge_owner_to_timeline_media
                  if 'edge_owner_to_timeline_media' in text:
                      print('  ✓ Found edge_owner_to_timeline_media!')
                      # Try to extract JSON data
                      match = re.search(r'\"edge_owner_to_timeline_media\":\s*(\{.*?\})\s*,\s*\"edge_followed_by\"', text)
                      if match:
                          try:
                              data = json.loads(match.group(1))
                              edges = data.get('edges', [])
                              print(f'  Found {len(edges)} posts')
                              for edge in edges[:3]:
                                  node = edge.get('node', {})
                                  caption = node.get('edge_media_to_caption', {}).get('edges', [{}])
                                  cap_text = caption[0].get('node', {}).get('text', '')[:100] if caption else ''
                                  print(f'    - {node.get(\"shortcode\", \"?\")} | {cap_text}')
                          except:
                              pass
                  elif '__a=1' in text or 'ProfilePage' in text:
                      print('  ✓ Found profile page data')
                  else:
                      print('  ✗ No profile data in page')
                      # Show what we got
                      print(f'  First 500 chars: {text[:500]}')
              else:
                  print('  ✗ Redirected to login — proxy not working for profile page')
          except Exception as e:
              print(f'  Error: {e}')

          # Test 2: Try the embed endpoint (sometimes works without auth)
          print()
          print('=== Test 2: Post embed endpoint ===')
          try:
              resp = cffi_requests.get(
                  'https://www.instagram.com/p/DZ9wTjEhbFk/embed/',
                  impersonate='chrome',
                  timeout=15,
                  proxies={'https': proxy, 'http': proxy},
                  allow_redirects=True,
              )
              print(f'  Status: {resp.status_code}')
              print(f'  Final URL: {resp.url}')
              has_login = '/accounts/login' in resp.url
              print(f'  Redirected to login: {has_login}')
              print(f'  Body length: {len(resp.text)}')
              if not has_login and resp.status_code == 200:
                  # Check for caption data
                  if 'caption' in resp.text.lower():
                      print('  ✓ Found caption data in embed!')
                  else:
                      print('  ✗ No caption data')
              else:
                  print('  ✗ Failed')
          except Exception as e:
              print(f'  Error: {e}')
          "
