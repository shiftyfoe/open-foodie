name: Test Instagram Network Interception

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-network:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Intercept Instagram API calls
        run: |
          python3 -c "
          import json
          from playwright.sync_api import sync_playwright

          print('=== Intercepting Instagram API Calls ===')

          api_calls = []

          def handle_response(response):
              url = response.url
              if 'instagram.com' in url and ('graphql' in url or 'api' in url or 'ajax' in url or 'media' in url):
                  try:
                      body = response.text()
                      api_calls.append({
                          'url': url,
                          'status': response.status,
                          'body_len': len(body),
                          'body_preview': body[:500] if len(body) < 10000 else body[:500] + f'... ({len(body)} total)'
                      })
                      print(f'  API: {response.status} {url[:100]}')
                  except:
                      api_calls.append({'url': url, 'status': response.status, 'body_len': 0})

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'
              )
              page = context.new_page()
              page.on('response', handle_response)

              print('Loading embed page...')
              try:
                  page.goto('https://www.instagram.com/p/DZ9wTjEhbFk/embed/', wait_until='networkidle', timeout=30000)
              except Exception as e:
                  print(f'  Navigation: {e}')

              page.wait_for_timeout(5000)

              print(f'\\nCaptured {len(api_calls)} API calls:')
              for call in api_calls:
                  print(f'\\n  URL: {call[\"url\"][:150]}')
                  print(f'  Status: {call[\"status\"]}')
                  print(f'  Body length: {call[\"body_len\"]}')
                  if call.get('body_preview'):
                      print(f'  Preview: {call[\"body_preview\"][:300]}')

              browser.close()
          "
