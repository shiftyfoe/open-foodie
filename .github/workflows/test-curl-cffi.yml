name: Test gallery-dl with Working Proxies

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-gallery-dl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests gallery-dl

      - name: Find working IG proxies
        id: proxies
        run: |
          python3 -c "
          import requests, random, json

          resp = requests.get(
              'https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&proxy_format=protocolipport&format=text&protocol=http&timeout=5000',
              timeout=15
          )
          raw = [l.strip() for l in resp.text.strip().splitlines() if l.strip()]
          random.shuffle(raw)

          ig_working = []
          for proxy in raw[:200]:  # test up to 200
              try:
                  r = requests.get(
                      'https://www.instagram.com/instagram/',
                      proxies={'http': proxy, 'https': proxy},
                      timeout=10,
                      headers={'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'},
                      allow_redirects=True,
                  )
                  if r.status_code == 200 and '/accounts/login' not in r.url:
                      ig_working.append(proxy)
                      print(f'✓ {proxy}')
                      if len(ig_working) >= 3:
                          break
              except:
                  pass

          print(f'Found {len(ig_working)} working IG proxies')
          # Write to GITHUB_OUTPUT
          with open('$GITHUB_OUTPUT', 'a') as f:
              f.write(f'proxies={json.dumps(ig_working)}')
          "

      - name: Test gallery-dl with working proxy
        run: |
          echo "=== Testing gallery-dl with proxy ==="
          PROXIES='${{ steps.proxies.outputs.proxies }}'
          echo "Working proxies: $PROXIES"

          # Extract first proxy
          PROXY=$(echo "$PROXIES" | python3 -c "import sys,json; print(json.load(sys.stdin)[0])" 2>/dev/null)
          echo "Using proxy: $PROXY"

          if [ -z "$PROXY" ]; then
            echo "No working proxy found, skipping gallery-dl test"
            exit 0
          fi

          # Test gallery-dl with proxy
          echo ""
          echo "=== gallery-dl with proxy ==="
          HTTPS_PROXY="$PROXY" HTTP_PROXY="$PROXY" gallery-dl -v -g "https://www.instagram.com/danielfooddiary/reel/DZ9wTjEhbFk/" 2>&1 | tail -20
          echo "EXIT: $?"

          echo ""
          echo "=== gallery-dl print metadata ==="
          HTTPS_PROXY="$PROXY" HTTP_PROXY="$PROXY" gallery-dl --print json -g "https://www.instagram.com/danielfooddiary/reel/DZ9wTjEhbFk/" 2>&1 | head -5
          echo "EXIT: $?"
