name: Test Instagram Proxies Thoroughly

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-proxies:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests curl_cffi

      - name: Test ALL proxies against Instagram
        run: |
          python3 -c "
          import requests
          import random

          # Fetch proxies
          print('=== Fetching proxies ===')
          resp = requests.get(
              'https://api.proxyscrape.com/v4/free-proxy-list/get?request=display_proxies&proxy_format=protocolipport&format=text&protocol=http&timeout=5000',
              timeout=15
          )
          raw = [l.strip() for l in resp.text.strip().splitlines() if l.strip()]
          print(f'Got {len(raw)} raw proxies')

          # Shuffle and test ALL of them
          proxies = raw[:]
          random.shuffle(proxies)

          ig_working = []
          httpbin_working = []
          tested = 0

          for proxy in proxies:
              tested += 1
              p = {'http': proxy, 'https': proxy}
              headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36'}

              # Quick httpbin test
              try:
                  r = requests.get('https://httpbin.org/ip', proxies=p, timeout=5)
                  if r.status_code == 200:
                      httpbin_working.append(proxy)
              except:
                  pass

              # Instagram test
              try:
                  r = requests.get(
                      'https://www.instagram.com/instagram/',
                      proxies=p,
                      timeout=10,
                      headers=headers,
                      allow_redirects=True,
                  )
                  if r.status_code == 200 and '/accounts/login' not in r.url:
                      ig_working.append(proxy)
                      print(f'  ✓ IG WORKING: {proxy} (tested {tested}/{len(proxies)})')
              except:
                  pass

              # Progress every 50
              if tested % 50 == 0:
                  print(f'  ... tested {tested}/{len(proxies)}, IG working: {len(ig_working)}, httpbin working: {len(httpbin_working)}')

              # Early exit if we find enough
              if len(ig_working) >= 5:
                  print(f'  Found 5 IG proxies, stopping early')
                  break

          print()
          print(f'=== RESULTS ===')
          print(f'Total tested: {tested}')
          print(f'httpbin working: {len(httpbin_working)}')
          print(f'Instagram working: {len(ig_working)}')
          if ig_working:
              print(f'Working IG proxies:')
              for p in ig_working:
                  print(f'  {p}')
          else:
              print('No proxies worked for Instagram')
          "
