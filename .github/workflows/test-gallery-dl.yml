name: Test gallery-dl Instagram

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install gallery-dl
        run: pip install gallery-dl

      - name: Test without login — verbose output
        run: |
          echo "=== gallery-dl version ==="
          gallery-dl --version
          echo ""

          echo "=== Test 1: danielfooddiary (verbose) ==="
          gallery-dl -v -g "https://www.instagram.com/danielfooddiary/" 2>&1 | head -30
          echo ""

          echo "=== Test 2: Try --print url format ==="
          gallery-dl --print "{category} {shortcode} {date} {caption:.40}" -g "https://www.instagram.com/danielfooddiary/" 2>&1 | head -20
          echo ""

          echo "=== Test 3: Try fetching a single post directly ==="
          gallery-dl -v -g "https://www.instagram.com/p/test123/" 2>&1 | head -20
          echo ""

          echo "=== Test 4: Check what Instagram returns ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" "https://www.instagram.com/danielfooddiary/?__a=1&__d=dis" -H "User-Agent: Mozilla/5.0" 2>&1
          echo ""

          echo "=== Done ==="
