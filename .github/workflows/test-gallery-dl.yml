name: Test gallery-dl Instagram

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-instagram:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install gallery-dl
        run: pip install gallery-dl

      - name: Test reel fetch without login
        run: |
          echo "=== gallery-dl version ==="
          gallery-dl --version
          echo ""

          echo "=== Test: Fetch reel (no login) ==="
          gallery-dl -v -g "https://www.instagram.com/danielfooddiary/reel/DZ9wTjEhbFk/" 2>&1
          echo "EXIT: $?"
          echo ""

          echo "=== Test: Print metadata ==="
          gallery-dl --print json -g "https://www.instagram.com/danielfooddiary/reel/DZ9wTjEhbFk/" 2>&1 | head -30
          echo "EXIT: $?"
