name: Daily Scrape

on:
  schedule:
    # 10:00 AM SGT (UTC+8) = 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      initial_limit:
        description: "Posts to fetch per channel on first run (default 100)"
        required: false
        default: "100"

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape all sources (concurrent)
        env:
          INITIAL_LIMIT: ${{ github.event.inputs.initial_limit || '100' }}
        run: python scraper.py

      - name: Local dedup — cluster near-duplicates & extract restaurant mentions
        run: python dedup_local.py

      - name: Generate static site
        run: python generate.py

      - name: Commit & push (with autostash for concurrent runs)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json docs/index.html
          test -f data/dedup.json && git add data/dedup.json || true
          test -f data/dedup_posts.json && git add data/dedup_posts.json || true
          git diff --staged --quiet && echo "Nothing new to commit" && exit 0
          git commit -m "chore: daily scrape $(date -u +%Y-%m-%d)"
          # Pull with autostash to handle concurrent workflow runs
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && break || sleep 5
          done
          git push
